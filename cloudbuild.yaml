steps:
- name: 'gcr.io/cloud-builders/git'
  args: ['clone', 'https://github.com/Sugirtha2807/my-cicd-app']

- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - compute
  - ssh
  - sugi-instance
  - --zone=us-central1-a
  - --command=cd my-cicd-app && git pull && npm install && npm start

options:
  logging: CLOUD_LOGGING_ONLY
